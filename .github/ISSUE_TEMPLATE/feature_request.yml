name: Feature request
description: Propose a new feature or improvement for elephant
title: "[feat]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Before filing, please check `CONTRIBUTING.md` for what we won't merge (no dependencies, no cloud sync, no breaking format changes without migration).

  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the pain point or missing capability — not the solution yet.
      placeholder: "Claude forgets X across sessions and I end up re-explaining..."
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What should elephant do? A command, a hook, a file format change?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about and why they are worse.

  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: Which files or commands would change? (`SKILL.md`, a new `/elephant <x>` command, a hook, etc.)

  - type: checkboxes
    id: constraints
    attributes:
      label: Compatibility
      options:
        - label: This does not require new dependencies (npm, pip, brew)
        - label: This does not require cloud sync or remote storage
        - label: This keeps the `ELEPHANT.md` format backwards compatible (or includes a migration)
