name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    name: trunk check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: trunk-io/trunk-action@v1

  syntax:
    name: node + json syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - name: node --check on hook scripts
        run: |
          for f in hooks/*.js; do
            echo "checking $f"
            node --check "$f"
          done
      - name: validate JSON files
        run: |
          node -e "JSON.parse(require('fs').readFileSync('.claude-plugin/plugin.json','utf8'))"
          node -e "JSON.parse(require('fs').readFileSync('hooks/hooks.json','utf8'))"

  smoke:
    name: smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - run: bash tests/smoke.sh

  version-sync:
    name: version sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: README badge matches plugin.json
        run: |
          PLUGIN_VERSION=$(node -e "process.stdout.write(require('./.claude-plugin/plugin.json').version)")
          if ! grep -q "badge/version-${PLUGIN_VERSION}-" README.md; then
            echo "::error::README version badge does not match plugin.json version ${PLUGIN_VERSION}"
            grep "badge/version-" README.md || true
            exit 1
          fi
          echo "README badge in sync with plugin.json (${PLUGIN_VERSION})"
